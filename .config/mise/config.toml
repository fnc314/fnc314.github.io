monorepo_root = true

[monorepo]
  lockfile = true
  config_roots = [
    "configs/@pwrs-cem",
    "configs/eslint",
    "configs/prettier",
    "configs/typedoc",
    "configs/typescript",
    "firebase/functions/node",
    "packages/components",
    "packages/data",
    "packages/design-tokens",
    "packages/services",
    "packages/types",
    "sites/docs",
    "sites/portfolio",
  ]

[tools]
  firebase = "15.24.0"
  node = "26.5.0"
  npm = "12.0.0"
  "npm:corepack" = "0.35.0"
  "npm:vite" = "8.1.5"
  pnpm = "11.13.1"
  tombi = "1.1.5"
  turbo = "2.10.4"
  usage = "3.5.5"

[deps]
  pnpm = {
    auto = true,
  }

[env]
  _ = {
    path = {
      path = [
        "{{config_root}}/node_modules/.bin",
      ],
      tools = true,
    },
  }
  configureExtensionsUseSymLinks = true
  LOCAL_CONFIG_DIR = "{{config_root}}/.config"
  LOCAL_BUILD_PYTHON_SERVER_PORT = "9100"
  BUILD_ENVIRONMENT = ""
  LOCAL_BUILD_PYTHON_SERVER_DIR = "dist/vite/production"
  RUST_BACKTRACE="full"

[settings]
  status = {
    show_tools = true,
    truncate = false,
  }
  task = {
    show_full_cmd = true,
  }
  npm = {
    package_manager = "pnpm",
  }
  node = {
    corepack = true,
  }
  color = true
  env_shell_expand = true
  terminal_progress = true
  color_theme = "dracula"
  experimental = true
  env_file = ".env/.env"
