monorepo_root = true

[monorepo]
  config_roots = [
    "design-tokens",
    "functions",
    "functions-python",
  ]

[tools]
  firebase = "15.21.0"
  node = "26.3.1"
  "npm:vite" = "8.0.16"
  pnpm = "11.8.0"
  tombi = "1.1.3"
  usage = "3.5.2"

[env]
  _ = {
    path = "[{{config_root}}/node_modules/.bin]",
  }
  configureExtensionsUseSymLinks = true
  LOCAL_CONFIG_DIR = "{{config_root}}/.config"
  LOCAL_BUILD_PYTHON_SERVER_PORT = "9999"
  BUILD_ENVIRONMENT = ""
  LOCAL_BUILD_PYTHON_SERVER_DIR = "dist/vite/development"

[settings]
  status = {
    show_tools = true,
    truncate = false,
  }
  task = {
    show_full_cmd = true,
  }
  npm = {
    package_manager = "pnpm",
  }
  color = true
  env_shell_expand = true
  terminal_progress = true
  color_theme = "dracula"
  experimental = true
