[tools]
  node = "26.1.0"
  pkl = "0.31.1"
  pnpm = "11.1.2"
  tombi = "0.11.4"
  usage = "3.3.0"

[env]
  _ = {
    path = "[{{config_root}}/node_modules/.bin]",
  }
  configureExtensionsUseSymLinks = true

[settings]
  status = {
    show_env = true,
    show_tools = true,
    truncate = false,
  }
  task = {
    show_full_cmd = true,
  }
  npm = {
    package_manager = "pnpm",
  }
  verbose = true
  color = true
  env_shell_expand = true
  terminal_progress = true
  color_theme = "dracula"
