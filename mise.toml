[tools]
  firebase = "15.19.0"
  node = "26.3.0"
  "npm:vite" = "8.0.16"
  pnpm = "11.5.1"
  tombi = "0.11.7"
  usage = "3.3.0"

[env]
  _ = {
    path = "[{{config_root}}/node_modules/.bin]",
  }
  configureExtensionsUseSymLinks = true
  LOCAL_BUILD_PYTHON_SERVER_PORT = "9997"
  BUILD_ENVIRONMENT = ""
  LOCAL_BUILD_PYTHON_SERVER_DIR = "dist/"

[settings]
  status = {
    show_tools = true,
    truncate = false,
  }
  task = {
    show_full_cmd = true,
  }
  npm = {
    package_manager = "pnpm",
  }
  color = true
  env_shell_expand = true
  terminal_progress = true
  color_theme = "dracula"

[task_config]
  dir = "{{cwd}}"
