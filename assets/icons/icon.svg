<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0, 0, 256, 256"
  preserveAspectRatio="xMidYMid meet"
  >
  <defs>
    <path
      id="text-curve"
      d="
        M 24 128
        C 58 146, 94 146, 128 128
        C 162 110, 198 110, 232 128
      "
      />

      <path
        id="hexagon-half"
        d="
          M 128 10
          L 232 58
          L 232 95
          C 198 77, 162 77, 128 95
          C 94 113, 58 113, 24 95
          L 24 58
          Z
        "
      />
  </defs>
  <style>
    .icon-text {
      font-family: -apple-system, Roboto, monospace;
      font-weight: 700;
      font-size: 9vh;
      text-rendering: optimizeLegibility;
      text-anchor: middle;
      dominant-baseline: central;
    }
  </style>


  <g display="none">
    <rect x="0" y="0" width="256" height="256" fill="beige" />
    <circle cx="128" cy="10" r="10" fill="white" />
    <circle cx="232" cy="58" r="10" fill="yellow" />
    <circle cx="232" cy="95" r="10" fill="blue" />
    <circle cx="198" cy="77" r="10" fill="green" />
    <circle cx="162" cy="77" r="10" fill="black" />
    <circle cx="128" cy="95" r="10" fill="purple" />
    <circle cx="94" cy="113" r="10" fill="teal" />
    <circle cx="58" cy="113" r="10" fill="maroon" />
    <circle cx="24" cy="95" r="10" fill="pink" />
    <circle cx="24" cy="58" r="10" fill="silver" />
  </g>

  <use
    href="#hexagon-half"
    fill="#c12a1c"
    fill-rule="evenodd"
    />

  <text
    class="icon-text"
    fill-rule="evenodd"
    direction="ltr"
    fill="#c12a1c"
    >
    <textPath
      href="#text-curve"
      stroke-linecap="round"
      startOffset="50%"
      lengthAdjust="spacingAndGlyphs"
      textLength="75%"
      method="align"
      >
      fnc314
    </textPath>
  </text>

  <use
    href="#hexagon-half"
    fill="#c12a1c"
    fill-rule="evenodd"
    transform="rotate(180)"
    transform-origin="center"
    />

</svg>