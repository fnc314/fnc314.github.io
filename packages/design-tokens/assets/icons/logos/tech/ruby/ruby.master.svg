<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 -0.5 256 256"
  preserveAspectRatio="xMidYMid"
  id="ruby-icon"
>
  <title>Ruby</title>

  <defs>
    <!-- Gradient tokens, one per facet, named for the facet that consumes it -->
    <linearGradient id="ruby-body-base-gradient" x1="84.75%" x2="58.254%" y1="111.399%" y2="64.584%">
    <stop offset="0%" stop-color="#fb7655"/>
    <stop offset="41%" stop-color="#e42b1e"/>
    <stop offset="99%" stop-color="#900"/>
    <stop offset="100%" stop-color="#900"/>
    </linearGradient>
    <linearGradient id="ruby-facet-right-lower-gradient" x1="116.651%" x2="1.746%" y1="60.89%" y2="19.288%">
    <stop offset="0%" stop-color="#871101"/>
    <stop offset="99%" stop-color="#911209"/>
    <stop offset="100%" stop-color="#911209"/>
    </linearGradient>
    <linearGradient id="ruby-facet-bottom-edge-gradient" x1="75.774%" x2="38.978%" y1="219.327%" y2="7.829%">
    <stop offset="0%" stop-color="#871101"/>
    <stop offset="99%" stop-color="#911209"/>
    <stop offset="100%" stop-color="#911209"/>
    </linearGradient>
    <linearGradient id="ruby-facet-left-lower-gradient" x1="50.012%" x2="66.483%" y1="7.234%" y2="79.135%">
    <stop offset="0%" stop-color="#fff"/>
    <stop offset="23%" stop-color="#e57252"/>
    <stop offset="46%" stop-color="#de3b20"/>
    <stop offset="99%" stop-color="#a60003"/>
    <stop offset="100%" stop-color="#a60003"/>
    </linearGradient>
    <linearGradient id="ruby-facet-center-gradient" x1="46.174%" x2="49.932%" y1="16.348%" y2="83.047%">
    <stop offset="0%" stop-color="#fff"/>
    <stop offset="23%" stop-color="#e4714e"/>
    <stop offset="56%" stop-color="#be1a0d"/>
    <stop offset="99%" stop-color="#a80d00"/>
    <stop offset="100%" stop-color="#a80d00"/>
    </linearGradient>
    <linearGradient id="ruby-facet-top-right-gradient" x1="36.965%" x2="49.528%" y1="15.594%" y2="92.478%">
    <stop offset="0%" stop-color="#fff"/>
    <stop offset="18%" stop-color="#e46342"/>
    <stop offset="40%" stop-color="#c82410"/>
    <stop offset="99%" stop-color="#a80d00"/>
    <stop offset="100%" stop-color="#a80d00"/>
    </linearGradient>
    <linearGradient id="ruby-facet-top-gradient" x1="13.609%" x2="85.764%" y1="58.346%" y2="-46.717%">
    <stop offset="0%" stop-color="#fff"/>
    <stop offset="54%" stop-color="#c81f11"/>
    <stop offset="99%" stop-color="#bf0905"/>
    <stop offset="100%" stop-color="#bf0905"/>
    </linearGradient>
    <linearGradient id="ruby-facet-left-edge-gradient" x1="27.624%" x2="50.745%" y1="21.135%" y2="79.056%">
    <stop offset="0%" stop-color="#fff"/>
    <stop offset="31%" stop-color="#de4024"/>
    <stop offset="99%" stop-color="#bf190b"/>
    <stop offset="100%" stop-color="#bf190b"/>
    </linearGradient>
    <linearGradient id="ruby-table-rim-band-gradient" x1="-20.667%" x2="104.242%" y1="122.282%" y2="-6.342%">
    <stop offset="0%" stop-color="#bd0012"/>
    <stop offset="7%" stop-color="#fff"/>
    <stop offset="17%" stop-color="#fff"/>
    <stop offset="27%" stop-color="#c82f1c"/>
    <stop offset="33%" stop-color="#820c01"/>
    <stop offset="46%" stop-color="#a31601"/>
    <stop offset="72%" stop-color="#b31301"/>
    <stop offset="99%" stop-color="#e82609"/>
    <stop offset="100%" stop-color="#e82609"/>
    </linearGradient>
    <linearGradient id="ruby-facet-bottom-left-gradient" x1="58.792%" x2="11.964%" y1="65.205%" y2="50.128%">
