    <stop offset="54%" stop-color="#990c00"/>
    <stop offset="99%" stop-color="#a80d0e"/>
    <stop offset="100%" stop-color="#a80d0e"/>
    </linearGradient>
    <linearGradient id="ruby-facet-right-gradient" x1="79.319%" x2="23.088%" y1="62.754%" y2="17.888%">
    <stop offset="0%" stop-color="#7e110b"/>
    <stop offset="99%" stop-color="#9e0c00"/>
    <stop offset="100%" stop-color="#9e0c00"/>
    </linearGradient>
    <linearGradient id="ruby-facet-top-right-corner-gradient" x1="92.88%" x2="59.841%" y1="74.122%" y2="39.704%">
    <stop offset="0%" stop-color="#79130d"/>
    <stop offset="99%" stop-color="#9e120b"/>
    <stop offset="100%" stop-color="#9e120b"/>
    </linearGradient>
    <linearGradient id="ruby-facet-left-edge-lower-gradient" x1="56.57%" x2="3.105%" y1="101.717%" y2="11.993%">
    <stop offset="0%" stop-color="#8b2114"/>
    <stop offset="43%" stop-color="#9e100a"/>
    <stop offset="99%" stop-color="#b3100c"/>
    <stop offset="100%" stop-color="#b3100c"/>
    </linearGradient>
    <linearGradient id="ruby-facet-top-right-tip-gradient" x1="30.87%" x2="92.471%" y1="35.599%" y2="100.694%">
    <stop offset="0%" stop-color="#b31000"/>
    <stop offset="44%" stop-color="#910f08"/>
    <stop offset="99%" stop-color="#791c12"/>
    <stop offset="100%" stop-color="#791c12"/>
    </linearGradient>
    <radialGradient id="ruby-facet-glossy-right-gradient" cx="32.001%" cy="40.21%" r="69.573%" fx="32.001%" fy="40.21%">
    <stop offset="0%" stop-color="#a80d00"/>
    <stop offset="99%" stop-color="#7e0e08"/>
    <stop offset="100%" stop-color="#7e0e08"/>
    </radialGradient>
    <radialGradient id="ruby-facet-glossy-bottom-gradient" cx="13.549%" cy="40.86%" r="88.386%" fx="13.549%" fy="40.86%">
    <stop offset="0%" stop-color="#a30c00"/>
    <stop offset="99%" stop-color="#800e08"/>
    <stop offset="100%" stop-color="#800e08"/>
