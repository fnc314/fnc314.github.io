  <!-- Faceted gem body, drawn back-to-front: base silhouette, then each
       triangular facet, then the table highlight/rim on top -->
  <g id="ruby-icon-facets">
    <!-- Main gem body silhouette (base layer) -->
    <path
      id="ruby-icon-body-base"
      fill="url(#ruby-body-base-gradient)"
      d="m197.467 167.764-145.52 86.41 188.422-12.787L254.88 51.393z"
    />
    <!-- Right-lower facet -->
    <path
      id="ruby-icon-facet-right-lower"
      fill="url(#ruby-facet-right-lower-gradient)"
      d="M240.677 241.257 224.482 129.48l-44.113 58.25z"
    />
    <!-- Bottom edge facet -->
    <path
      id="ruby-icon-facet-bottom-edge"
      fill="url(#ruby-facet-bottom-edge-gradient)"
      d="m240.896 241.257-118.646-9.313-69.674 21.986z"
    />
    <!-- Left-lower facet -->
    <path
      id="ruby-icon-facet-left-lower"
      fill="url(#ruby-facet-left-lower-gradient)"
      d="m52.744 253.955 29.64-97.1L17.16 170.8z"
    />
    <!-- Center facet -->
    <path
      id="ruby-icon-facet-center"
      fill="url(#ruby-facet-center-gradient)"
      d="M180.358 188.05 153.085 81.226l-78.047 73.16z"
    />
    <!-- Top-right facet -->
    <path
      id="ruby-icon-facet-top-right"
      fill="url(#ruby-facet-top-right-gradient)"
      d="m248.693 82.73-73.777-60.256-20.544 66.418z"
    />
    <!-- Top facet -->
    <path
      id="ruby-icon-facet-top"
      fill="url(#ruby-facet-top-gradient)"
      d="M214.191.99 170.8 24.97 143.424.669z"
    />
    <!-- Left edge facet -->
    <path
      id="ruby-icon-facet-left-edge"
      fill="url(#ruby-facet-left-edge-gradient)"
      d="m0 203.372 18.177-33.151-14.704-39.494z"
    />
    <!-- White rim highlight around the table (top cut surface) -->
    <path
      id="ruby-icon-table-rim-highlight"
      fill="#fff"
      d="m2.496 129.48 14.794 41.963 64.283-14.422 73.39-68.207 20.712-65.787L143.063 0 87.618 20.75c-17.469 16.248-51.366 48.396-52.588 49-1.21.618-22.384 40.639-32.534 59.73"
    />
    <!-- Banded rim gradient wrapping the table -->
    <path
      id="ruby-icon-table-rim-band"
      fill="url(#ruby-table-rim-band-gradient)"
      d="M54.442 54.094c37.86-37.538 86.667-59.716 105.397-40.818 18.72 18.898-1.132 64.823-38.992 102.349-37.86 37.525-86.062 60.925-104.78 42.027-18.73-18.885.515-66.032 38.375-103.558"
    />
    <!-- Bottom-left facet -->
    <path
      id="ruby-icon-facet-bottom-left"
      fill="url(#ruby-facet-bottom-left-gradient)"
      d="m52.744 253.916 29.408-97.409 97.665 31.376c-35.312 33.113-74.587 61.106-127.073 66.033"
    />
    <!-- Right facet -->
    <path
      id="ruby-icon-facet-right"
      fill="url(#ruby-facet-right-gradient)"
      d="m155.092 88.622 25.073 99.313c29.498-31.016 55.972-64.36 68.938-105.603z"
    />
    <!-- Top-right corner facet -->
    <path
      id="ruby-icon-facet-top-right-corner"
      fill="url(#ruby-facet-top-right-corner-gradient)"
      d="M248.847 82.833c10.035-30.282 12.35-73.725-34.966-81.791l-38.825 21.445z"
    />
    <!-- Solid shadow facet, left edge -->
    <path
      id="ruby-icon-shadow-left"
      fill="#9e1209"
      d="M0 202.935c1.39 49.979 37.448 50.724 52.808 51.162l-35.48-82.86z"
    />
    <!-- Glossy radial-highlight facet, right side -->
    <path
      id="ruby-icon-facet-glossy-right"
      fill="url(#ruby-facet-glossy-right-gradient)"
      d="M155.232 88.777c22.667 13.932 68.35 41.912 69.276 42.426 1.44.81 19.695-30.784 23.838-48.64z"
    />
    <!-- Glossy radial-highlight facet, bottom -->
    <path
      id="ruby-icon-facet-glossy-bottom"
      fill="url(#ruby-facet-glossy-bottom-gradient)"
      d="m82.113 156.507 39.313 75.848c23.246-12.607 41.45-27.967 58.121-44.42z"
    />
    <!-- Lower-left edge facet -->
    <path
      id="ruby-icon-facet-left-edge-lower"
      fill="url(#ruby-facet-left-edge-lower-gradient)"
      d="m17.174 171.34-5.57 66.328c10.51 14.357 24.97 15.605 40.136 14.486-10.973-27.311-32.894-81.92-34.566-80.814"
    />
    <!-- Top-right tip facet -->
    <path
      id="ruby-icon-facet-top-right-tip"
      fill="url(#ruby-facet-top-right-tip-gradient)"
      d="m174.826 22.654 78.1 10.96c-4.169-17.662-16.969-29.06-38.787-32.623z"
    />
  </g>
</svg>
